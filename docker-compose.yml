services:
  db:
    image: postgres:17
    env_file:
      - ./.env.local
    restart: always
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  liquibase:
    image: liquibase/liquibase
    env_file:
      - .env.local
    volumes:
      - ./db/changelog.xml:/liquibase/changelog.xml
      - ./db/scripts:/liquibase/scripts
      - ./db/drivers:/liquibase/lib
    command: >
      --classpath=/liquibase/lib/postgresql.jar
      --url=jdbc:postgresql://db:${POSTGRES_PORT}/${POSTGRES_DB}
      --changeLogFile=changelog.xml
      --username=postgres
      --password=${POSTGRES_PASSWORD}
      update
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
